services:
  chatbot-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: milk-tea-chatbot-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data

